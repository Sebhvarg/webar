<ion-app>
  <!-- Pantalla de Carga (Loading Screen) -->
  <div id="loading-screen" *ngIf="showLoadingScreen">
    <div class="loading-logo-container">
      <img src="assets/img/logo.webp" alt="Real Alto Logo" class="loading-logo" onerror="this.onerror=null; this.src='assets/img/logo.webpn';">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Interactive A-Frame Scene (Only initialized after starting WebAR) -->
  <a-scene 
    *ngIf="stateService.arStarted$ | async"
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;">
    
    <a-assets>
      <img *ngFor="let exp of stateService.experiences" [id]="'scan-img-' + exp.id" [src]="exp.scanImage">
    </a-assets>

    <a-marker
      *ngFor="let exp of stateService.experiences"
      [id]="'marker-' + exp.markerPreset"
      [attr.preset]="exp.markerPreset"
      registerevents>
    </a-marker>
    
    <a-entity camera>
      <a-cursor raycaster="objects: a-image, a-entity" cursor="fuse: false" visible="false"></a-cursor>
    </a-entity>
  </a-scene>

  <!-- Home Page / Main Layer -->
  <app-home-page *ngIf="!(stateService.arStarted$ | async)"></app-home-page>

  <!-- AR Experience Overlay Page -->
  <app-ar-view *ngIf="stateService.arStarted$ | async"></app-ar-view>

  <!-- Choza fija en pantalla completa al detectar Hiro -->
  <div class="fixed-choza-overlay" *ngIf="(stateService.arStarted$ | async) && isFixedScanOverlayVisible">
    <img [src]="activeScanImage" alt="Escena AR" class="fixed-choza-image">
  </div>
  <div class="fixed-choza-controls" *ngIf="(stateService.arStarted$ | async) && isFixedScanOverlayVisible">
    <button class="enter-choza-button" (click)="enterChozaFromOverlay()">Entrar a la choza</button>
  </div>

  <!-- Gyroscopic Cabin Experience Overlay -->
  <app-cabin-view *ngIf="stateService.arStarted$ | async"></app-cabin-view>

  <!-- Sidebar Component Layer -->
  <app-sidebar></app-sidebar>
</ion-app>
