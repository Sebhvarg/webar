<!-- Sidebar Overlay Wrapper -->
<div class="sidebar-wrapper" [class.open]="isOpen" (click)="closeSidebar()">
  <!-- Sidebar Drawer Content -->
  <aside class="sidebar-container" (click)="$event.stopPropagation()">
    <!-- Top Brand Section -->
    <div class="sidebar-brand">
      <div class="logo-side-wrapper">
        <img
          src="assets/img/logoside.webp"
          alt="Logo"
          class="logoside"
        />
      </div>
    </div>

    <!-- Navigation Menu Items -->
    <nav class="sidebar-nav">
      <button 
        class="nav-item" 
        [class.active]="activeTab === 'inicio'"
        (click)="selectTab('inicio')">
        INICIO
      </button>

      <button 
        class="nav-item" 
        [class.active]="activeTab === 'informacion'"
        (click)="selectTab('informacion')">
        INFORMACIÓN
      </button>

      <button 
        class="nav-item" 
        [class.active]="activeTab === 'ar'"
        (click)="selectTab('ar')">
        WEB AR EXP.
      </button>
    </nav>

    <!-- Bottom Sign Out / Exit Action -->
    <div class="sidebar-footer">
      <button class="btn-logout" aria-label="Salir" (click)="exitApp()">
        <svg viewBox="0 0 24 24" class="logout-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    </div>
  </aside>
</div>
