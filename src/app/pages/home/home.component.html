<div class="home-container">
  <!-- Blurred background image -->
  <div class="background-overlay"></div>

  <!-- Header section -->
  <header class="home-header">
    <button class="menu-btn" [attr.aria-label]="'common.menu' | t" (click)="toggleSidebar()">
      <span class="menu-icon">☰</span>
    </button>
    <div class="header-right">
      <div class="badge-complejo">
        <span>{{ 'common.complex' | t }}</span>
      </div>
      <div class="language-switcher">
        <button type="button" class="lang-btn" [class.active]="currentLanguage === 'es'" (click)="changeLanguage('es')">ES</button>
        <button type="button" class="lang-btn" [class.active]="currentLanguage === 'en'" (click)="changeLanguage('en')">EN</button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="home-content">
    <!-- Brand / Logo Area -->
    <div class="brand-container">
      <div class="logo-wrapper">
        <img
          src="assets/img/logovaldivia.webp"
          [attr.alt]="'common.logo' | t"
          
        />
      </div>
      <div class="brand-divider"></div>
      <div class="brand-text">
        <h1 class="title-real">REAL</h1>
        <h1 class="title-alto">ALTO</h1>
      </div>
    </div>

    <!-- Location -->
    <p class="location-text">{{ 'home.location' | t }}</p>

    <!-- App Pitch -->
    <h2 class="main-pitch">{{ 'home.pitch' | t }}</h2>
    <p class="description-text">
      {{ 'home.description' | t }}
    </p>

    <!-- Action Button -->
    <button class="btn-start-ar" (click)="iniciarWebAR()">
      {{ 'home.startAr' | t }}
    </button>

    <!-- Warning Message -->
    <p class="warning-text">
      <span class="warning-icon">▲</span> {{ 'home.cameraWarning' | t }}
    </p>
  </main>
</div>
