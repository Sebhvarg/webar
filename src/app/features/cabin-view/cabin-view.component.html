<!-- Full Screen Interior Choza Overlay wrapped in Ionic App component -->
<ion-app id="interior-overlay" class="interior-overlay" *ngIf="stateService.interiorActive$ | async" style="display: block;">
  <button class="back-to-scan-btn interactive" (click)="backToScan()">Volver a escanear</button>

  <!-- Fullscreen background container -->
  <div id="interior-bg" class="interior-bg" [style.backgroundImage]="'url(' + currentLayer.backgroundImage + ')'"></div>
  
  <!-- Table overlayed at the bottom -->
  <div class="table-container">
    <img [src]="currentLayer.foregroundImage" id="mesa-img" class="mesa-img" alt="Mesa">
    
    <!-- Horizontal list of elements on the table -->
    <div id="elements-horizontal-container" class="elements-horizontal-container interactive">
      <img 
        *ngFor="let element of currentLayer.elements"
        [src]="element.png" 
        class="valdivia-btn interactive" 
        [class.active]="activeElementId === element.id"
        [alt]="element.name"
        (click)="openElement(element)">
    </div>
  </div>

  <!-- 3D Model Viewer Modal using ion-modal -->
  <ion-modal [isOpen]="showModal" (didDismiss)="closeModal()" class="model-modal-ionic">
    <ng-template>
      <ion-header>
        <ion-toolbar color="dark">
          <ion-title>Detalle</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="closeModal()">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content color="dark" class="ion-padding">
        <div class="modal-body-layout">
          <div class="model-viewer-container">
            <!-- Google Model Viewer -->
            <model-viewer 
              *ngIf="selectedElement"
              [src]="selectedElement.glb"
              camera-controls
              auto-rotate
              ar
              shadow-intensity="1"
              [alt]="selectedElement.name">
            </model-viewer>
          </div>
          <div class="modal-info-card">
            <h2 class="modal-title">{{ selectedElement?.name }}</h2>
            <p class="modal-desc">{{ selectedElement?.desc }}</p>
          </div>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-app>
