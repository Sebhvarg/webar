<!-- Real-Time UI overlay -->
<div id="ui-container" *ngIf="!(stateService.interiorActive$ | async)">
  <!-- Top Bar Status info -->
  <div class="ar-header">
    <div class="badge glass">
      <span id="status-dot" class="status-dot" [class.active]="statusDotActive"></span>
      <span id="status-text">{{ statusText }}</span>
    </div>
    <button id="reset-btn" class="btn-secondary interactive" (click)="resetExperience()">Reiniciar</button>
  </div>

  <!-- Instruction Banner -->
  <div id="instruction-banner" class="instruction-banner glass" [class.visible]="showInstructionBanner">
    <div id="instruction-title" class="instruction-text">{{ instructionTitle }}</div>
    <div id="instruction-desc" class="instruction-subtext">{{ instructionDesc }}</div>
    <div class="action-btn-container">
      <button id="device-tilt-btn" class="btn-secondary interactive" style="background: var(--primary); border: none; margin-top: 8px;" (click)="anchorModel()">Ya lo moví</button>
    </div>
  </div>

  <!-- Bottom Selection Bar -->
  <div class="selector-container">
    <div class="selector-title">Selecciona un modelo</div>
    <div id="model-list" class="model-list">
      <div 
        *ngFor="let key of ['robot', 'spaceship']"
        class="model-card glass interactive" 
        [class.active]="activeModelId === key"
        (click)="selectModel(key)">
        <div class="model-icon">{{ stateService.models[key].emoji }}</div>
        <div class="model-name">{{ stateService.models[key].name }}</div>
        <div class="model-marker-info">Marcador: {{ stateService.models[key].markerPreset.toUpperCase() }}</div>
      </div>
    </div>
  </div>
</div>
