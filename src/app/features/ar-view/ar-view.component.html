<!-- Real-Time UI overlay -->
<div id="ui-container" *ngIf="!(stateService.interiorActive$ | async)">
  <!-- Top Bar Status info -->
  <div class="ar-header" *ngIf="isLandscapeMode">
    <button id="back-home-btn" class="btn-secondary interactive" (click)="goToMainMenu()">Volver al menu</button>
    <div class="badge glass">
      <span id="status-dot" class="status-dot" [class.active]="statusDotActive"></span>
      <span id="status-text">{{ statusText }}</span>
    </div>
    <button id="reset-btn" class="btn-secondary interactive" (click)="resetExperience()">Reiniciar</button>
  </div>

  <div class="orientation-warning glass" *ngIf="!isLandscapeMode">
    Para escanear marcadores, gira el telefono a horizontal.
  </div>

  <details class="marker-dropdown glass interactive" *ngIf="isLandscapeMode">
    <summary>Marcadores (toca para desplegar)</summary>
    <div class="marker-dropdown-content">
      <button
        class="marker-pill interactive"
        [class.active]="activeModelId === 'robot'"
        (click)="selectModel('robot')"
        type="button">
        Hiro - Choza
      </button>
      <button
        class="marker-pill interactive"
        [class.active]="activeModelId === 'spaceship'"
        (click)="selectModel('spaceship')"
        type="button">
        Kanji - Pato
      </button>
    </div>
  </details>
</div>
